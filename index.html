<!DOCTYPE html>
<html lang="en-MM">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{pageTitle}}</title>
  <meta name="description" content="{{pageDescription}}">
  <meta name="keywords" content="{{pageKeywords}}">
  <link rel="canonical" href="{{pageUrl}}">

  <!-- Open Graph for social sharing -->
  <meta property="og:title" content="{{pageTitle}}">
  <meta property="og:description" content="{{pageDescription}}">
  <meta property="og:image" content="{{pageImage}}">
  <meta property="og:url" content="{{pageUrl}}">
  <meta property="og:type" content="website">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{pageTitle}}">
  <meta name="twitter:description" content="{{pageDescription}}">
  <meta name="twitter:image" content="{{pageImage}}">

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [

      {
        "@type": "WebSite",
        "name": "Your Store Name",
        "url": "https://yourwebsite.com",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://yourwebsite.com/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      },

      {
        "@type": "Organization",
        "name": "Your Store Name",
        "url": "https://yourwebsite.com",
        "logo": "https://yourwebsite.com/logo.png",
        "sameAs": [
          "https://www.facebook.com/yourpage",
          "https://twitter.com/yourprofile",
          "https://www.instagram.com/yourprofile"
        ]
      },

      <!-- Categories / Collections -->
      {{#categories}}
      {
        "@type": "CollectionPage",
        "name": "{{name}}",
        "url": "https://yourwebsite.com/categories/{{slug}}",
        "description": "{{description}}"
      }{{#unless @last}},{{/unless}}
      {{/categories}},

      <!-- Products -->
      {{#products}}
      {
        "@type": "Product",
        "name": "{{name}}",
        "image": [
          {{#images}}"{{url}}"{{#unless @last}},{{/unless}}{{/images}}
        ],
        "description": "{{description}}",
        "sku": "{{sku}}",
        "brand": {
          "@type": "Brand",
          "name": "{{brand}}"
        },
        "offers": {
          "@type": "Offer",
          "url": "https://yourwebsite.com/products/{{slug}}",
          "priceCurrency": "MMK",
          "price": "{{price}}",
          "availability": "{{#if inStock}}https://schema.org/InStock{{else}}https://schema.org/OutOfStock{{/if}}",
          "itemCondition": "https://schema.org/NewCondition"
        },
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "{{average_rating}}",
          "reviewCount": "{{review_count}}"
        }
      }{{#unless @last}},{{/unless}}
      {{/products}},

      <!-- Product Details Page Example -->
      {
        "@type": "Product",
        "name": "{{product.name}}",
        "image": [
          {{#product.images}}"{{url}}"{{#unless @last}},{{/unless}}{{/product.images}}
        ],
        "description": "{{product.description}}",
        "sku": "{{product.sku}}",
        "brand": {
          "@type": "Brand",
          "name": "{{product.seller_name}}"
        },
        "offers": {
          "@type": "Offer",
          "url": "https://yourwebsite.com/products/{{product.slug}}",
          "priceCurrency": "MMK",
          "price": "{{product.price}}",
          "availability": "{{#if product.inStock}}https://schema.org/InStock{{else}}https://schema.org/OutOfStock{{/if}}",
          "itemCondition": "https://schema.org/NewCondition",
          "seller": {
            "@type": "Organization",
            "name": "{{product.seller_name}}"
          }
        },
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "{{product.average_rating}}",
          "reviewCount": "{{product.review_count}}"
        },
        "review": [
          {{#product.reviews}}
          {
            "@type": "Review",
            "author": {
              "@type": "Person",
              "name": "{{user_name}}"
            },
            "datePublished": "{{created_at}}",
            "reviewBody": "{{comment}}",
            "reviewRating": {
              "@type": "Rating",
              "ratingValue": "{{rating}}",
              "bestRating": "5",
              "worstRating": "1"
            }
          }{{#unless @last}},{{/unless}}
          {{/product.reviews}}
        ]
      }
    ]
  }
  </script>

</head>

<body>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>

</body>

</html>
