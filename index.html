<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Default fallback title -->
  <title>Pyonea Marketplace | Buy & Sell Products in Myanmar</title>

  <!-- Default description fallback -->
  <meta name="description"
    content="Buy and sell products easily across Myanmar with Pyonea marketplace. Discover trusted sellers and great deals." />

  <!-- Canonical -->
  <link rel="canonical" href="https://pyonea.com/" />

  <!-- hreflang fallback -->
  <link rel="alternate" hreflang="en" href="https://pyonea.com/" />
  <link rel="alternate" hreflang="my" href="https://pyonea.com/" />
  <link rel="alternate" hreflang="x-default" href="https://pyonea.com/" />

  <!-- Open Graph -->
  <meta property="og:title" content="Pyonea Marketplace" />
  <meta property="og:description" content="Buy and sell products easily across Myanmar with Pyonea marketplace." />
  <meta property="og:image" content="https://pyonea.com/og_image.png" />
  <meta property="og:url" content="https://pyonea.com/" />
  <meta property="og:type" content="website" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Pyonea Marketplace" />
  <meta name="twitter:description" content="Buy and sell products easily across Myanmar with Pyonea marketplace." />
  <meta name="twitter:image" content="https://pyonea.com/og_image.png" />

  <!-- Performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <!-- Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Robots -->
  <meta name="robots" content="index, follow" />

  <!-- Base JSON-LD -->
  <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "Organization",
      "name": "Pyonea Marketplace",
      "url": "https://pyonea.com",
      "logo": "https://pyonea.com/logo.png"
    },
    {
      "@type": "WebSite",
      "name": "Pyonea Marketplace",
      "url": "https://pyonea.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://pyonea.com/products?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  ]
}
</script>

</head>

<body>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>

</body>

</html>
